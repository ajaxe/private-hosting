include:
  - path: ../compose.networks.yml
services:
  mongodb:
    image: mongodb/mongodb-community-server:7.0.16-ubuntu2204
    profiles:
      - database
    extends:
      file: ../compose.base.yml
      service: x-base-service
    user: 0:0
    deploy:
      resources:
        limits:
          memory: 1g
    ports:
      - "27017:27017"
    volumes:
      - "${HOSTING_DIR}/mongodb/storage:/data/db"
    container_name: mongo-db
    environment:
      MONGODB_INITDB_ROOT_USERNAME: ${RootUsername}
      MONGODB_INITDB_ROOT_PASSWORD: ${RootPassword}
  
  mongo-exress:
    image: mongo-express:latest
    profiles:
      - database
    restart: unless-stopped
    extends:
      file: ../compose.base.yml
      service: x-base-service
    labels:
      - "traefik.docker.network=public-proxy"
      - "traefik.enable=true"
      - "traefik.http.routers.mongo-express.rule=Host(`mge.internal.apogee-dev.com`)"
      - "traefik.http.routers.mongo-express.entrypoints=websecured"
      - traefik.http.routers.mongo-express.middlewares=mongo-express-header,fwdauth-global@file
      - "traefik.http.routers.mongo-express.service=mongo-express"
      - traefik.http.routers.mongo-express.tls=true
      - traefik.http.routers.mongo-express.tls.certResolver=dns_route53
      - traefik.http.routers.mongo-express.tls.domains[0].main=*.internal.apogee-dev.com
      - traefik.http.routers.mongo-express.tls.domains[0].sans=internal.apogee-dev.com

      - traefik.http.middlewares.mongo-express-header.headers.customrequestheaders.X-Service-Token=${WebDBToken}

      - "traefik.http.services.mongo-express.loadbalancer.server.port=8081"
    container_name: mongo-express
    environment:
      ME_CONFIG_MONGODB_URL: "mongodb://${RootUsername}:${RootPassword}@mongodb:27017/admin?ssl=false"
