  #     resources:
  #       limits:
  #         memory: 512m

  uptime:
    image: louislam/uptime-kuma:2.4.0
    profiles:
      - infrastructure
    restart: unless-stopped
    user: 0:0
    container_name: uptime-kuma
    volumes:
      - ./uptime-kuma/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - dockge-network
      - public-proxy
    labels:
      - "traefik.docker.network=public-proxy"
      - "traefik.enable=true"
      - "traefik.http.routers.www-status.rule=Host(`status.apogee-dev.com`)"
      - "traefik.http.routers.www-status.entrypoints=websecured"
      - "traefik.http.routers.www-status.middlewares=default-compress@file"
      - "traefik.http.routers.www-status.tls=true"
      - "traefik.http.routers.www-status.tls.certResolver=default"
      - "traefik.http.routers.www-status.tls.domains[0].main=status.apogee-dev.com"
      - "traefik.http.routers.www-status.service=www-status"

      - "traefik.http.services.www-status.loadbalancer.server.port=3001"

networks:
  dockge-network:
    external: true
  public-proxy:
    external: true