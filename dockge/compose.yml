services:
  caddy:
    image: caddy:2.10.0
    profiles:
      - infrastructure
    container_name: caddy
    restart: unless-stopped
    ports:
      - "${PORT}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddy_data:/data
      - ${HOSTING_DIR}/local_ssl_certs:/local_ssl_certs
    networks:
      - dockge-network

  # dockge:
